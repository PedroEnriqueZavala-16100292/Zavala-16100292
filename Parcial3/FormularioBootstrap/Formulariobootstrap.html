<form role="form">
    <html>
        <head>
            <meta charset='UTF-8'>
            <title>Formulario Bootstrap
            </title>
          
            <link rel="stylesheet" href="Diseño.css">
        
        </head>

    <div class="form-group">
        <label for="nombre">Nombre </label>
        <input type="nombre" class="form-control" id="nombre">
      </div>

      <div class="form-group">
        <label for="ApellidoPat">Apellido Paterno</label>
        <input type="ApellidoPat" class="form-control" id="ApellidoPat">
      </div>

      <div class="form-group">
        <label for="ApellidoMat">Apellido Materno</label>
        <input type="ApellidoMat" class="form-control" id="ApellidoMat">
      </div>

      <div class="form-group">
        <label for="Peso">Peso</label>
        <input type="Peso" class="form-control" id="Peso">
      </div>

      <div class="form-group">
        <label for="Estatura">Estatura</label>
        <input type="Estatura" class="form-control" id="Estatura">
      </div>

      <div class="form-group">
        <label for="Edad">Edad</label>
        <input type="Edad" class="form-control" id="Edad">
      </div>

      <div class="form-group">
        <label for="Alergico">Alergico a algun medicamento</label>
        <input type="Alergico" class="form-control" id="Alergico">
      </div>

      <div class="form-group">
        <label for="email">Correo Electronico</label>
        <input type="email" class="form-control" id="email">
      </div>

    <div class="form-group">
      <label for="NombreDr">Nombre Doctor</label>
      <input type="NombreDr" class="form-control" id="NombreDr">
    </div>

    <div class="form-group">
      <label for="Indicaciones">Indicaciones Medicas</label>
      <input type="Indicaciones" class="form-control" id="Indicaciones">
    </div>

    <div class="checkbox">
      <label><input type="checkbox"> Acepta usted tener contacto directo con el Doctor</label>
    </div>

    <button type="submit" class="btn btn-default">Generar Receta Medica</button>
  </form>
</html>
